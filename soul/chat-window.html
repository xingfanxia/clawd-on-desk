<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
<title>Chat with Clawd</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f5f5; --chat-bg: #fff; --text: #1a1a1a; --text-dim: #888;
  --user-bg: #f97316; --user-text: #fff;
  --pet-bg: #fff; --pet-border: #e5e5e5;
  --input-bg: #fff; --input-border: #ddd;
  --send-bg: #f97316; --send-text: #fff;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0a0a0a; --chat-bg: #141414; --text: #e5e5e5; --text-dim: #666;
    --user-bg: #ea580c; --user-text: #fff;
    --pet-bg: #1e1e1e; --pet-border: #333;
    --input-bg: #1e1e1e; --input-border: #333;
    --send-bg: #ea580c; --send-text: #fff;
  }
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; flex-direction: column;
}

/* Header */
.header {
  padding: 12px 16px; display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--pet-border);
  background: var(--chat-bg);
  -webkit-app-region: drag;
}
.header .avatar { font-size: 24px; }
.header .name { font-size: 14px; font-weight: 600; }
.header .status { font-size: 11px; color: var(--text-dim); }
.header .close-btn {
  margin-left: auto; -webkit-app-region: no-drag;
  width: 28px; height: 28px; border-radius: 50%;
  border: none; background: transparent; color: var(--text-dim);
  font-size: 18px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
}
.header .close-btn:hover { background: rgba(128,128,128,0.2); color: var(--text); }

/* Messages */
.messages {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.msg {
  max-width: 80%; display: flex; flex-direction: column;
  animation: msgIn 0.2s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user { align-self: flex-end; }
.msg.pet { align-self: flex-start; }
.msg .bubble {
  padding: 8px 12px; border-radius: 12px;
  font-size: 13px; line-height: 1.5;
  word-wrap: break-word;
}
.msg.user .bubble {
  background: var(--user-bg); color: var(--user-text);
  border-bottom-right-radius: 4px;
}
.msg.pet .bubble {
  background: var(--pet-bg); border: 1px solid var(--pet-border);
  border-bottom-left-radius: 4px;
}
.msg .time {
  font-size: 10px; color: var(--text-dim);
  margin-top: 2px; padding: 0 4px;
}
.msg.user .time { text-align: right; }

/* Typing indicator */
.typing-indicator { display: flex; gap: 3px; padding: 8px 12px; }
.typing-indicator .dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--text-dim);
  animation: typeBounce 1.2s infinite;
}
.typing-indicator .dot:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator .dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes typeBounce {
  0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
  40% { opacity: 1; transform: translateY(-3px); }
}

/* Input */
.input-area {
  padding: 8px 12px; display: flex; gap: 8px;
  border-top: 1px solid var(--pet-border);
  background: var(--chat-bg);
}
.input-area input {
  flex: 1; padding: 8px 12px; font-size: 13px;
  background: var(--input-bg); color: var(--text);
  border: 1px solid var(--input-border); border-radius: 20px;
  outline: none;
}
.input-area input:focus { border-color: var(--send-bg); }
.input-area input::placeholder { color: var(--text-dim); }
.send-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--send-bg); color: var(--send-text);
  border: none; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.2s;
}
.send-btn:hover { opacity: 0.85; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Empty state */
.empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text-dim); gap: 8px;
}
.empty .big { font-size: 40px; }
.empty .hint { font-size: 12px; }

/* Action text (italic for *asterisks*) */
.action-text { font-style: italic; opacity: 0.8; }

/* Date separator */
.date-sep {
  text-align: center; font-size: 11px; color: var(--text-dim);
  padding: 8px 0; margin: 4px 0;
  display: flex; align-items: center; gap: 8px;
}
.date-sep::before, .date-sep::after {
  content: ''; flex: 1; height: 1px; background: var(--pet-border);
}

/* Scrollbar */
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 2px; }
</style>
</head>
<body>
<div class="header">
  <span class="avatar">🦀</span>
  <div>
    <div class="name" id="petName">Clawd</div>
    <div class="status" id="petStatus">在线</div>
  </div>
  <button class="close-btn" onclick="window.close()" title="Close">×</button>
</div>

<div class="messages" id="messages">
  <div class="empty" id="emptyState">
    <div class="big">🦀</div>
    <div class="hint">和小肥聊聊天吧</div>
  </div>
</div>

<div class="input-area">
  <input type="text" id="input" placeholder="说点什么..." autofocus>
  <button class="send-btn" id="sendBtn" onclick="send()">↑</button>
</div>

<script>
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const emptyState = document.getElementById("emptyState");
let typingEl = null;
let _lastDateLabel = null; // track last date separator shown

// ---------------------------------------------------------------------------
// Smart auto-scroll: only scroll to bottom if user is near bottom
// ---------------------------------------------------------------------------
function isNearBottom() {
  const threshold = 100;
  return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < threshold;
}

function scrollToBottomIfNeeded() {
  if (isNearBottom()) messagesEl.scrollTop = messagesEl.scrollHeight;
}

function forceScrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ---------------------------------------------------------------------------
// Date formatting
// ---------------------------------------------------------------------------
function dateLabel(date) {
  const d = date instanceof Date ? date : new Date();
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  const sameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  if (sameDay(d, today)) return "今天";
  if (sameDay(d, yesterday)) return "昨天";
  return d.toLocaleDateString("zh-CN", { month: "long", day: "numeric" });
}

function formatTime(date) {
  const d = date instanceof Date ? date : new Date();
  return d.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false });
}

function maybeInsertDateSep(date) {
  const d = date instanceof Date ? date : new Date();
  const label = dateLabel(d);
  if (label !== _lastDateLabel) {
    _lastDateLabel = label;
    const sep = document.createElement("div");
    sep.className = "date-sep";
    sep.textContent = label;
    messagesEl.appendChild(sep);
  }
}

// ---------------------------------------------------------------------------
// Text rendering
// ---------------------------------------------------------------------------
function renderText(text) {
  const frag = document.createDocumentFragment();
  const parts = text.split(/(\*[^*]+\*)/g);
  for (const part of parts) {
    if (part.startsWith("*") && part.endsWith("*") && part.length > 2) {
      const span = document.createElement("span");
      span.className = "action-text";
      span.textContent = part.slice(1, -1);
      frag.appendChild(span);
    } else if (part) {
      frag.appendChild(document.createTextNode(part));
    }
  }
  return frag;
}

// ---------------------------------------------------------------------------
// Message rendering
// ---------------------------------------------------------------------------
function addMessage(text, role, timestamp) {
  if (emptyState) emptyState.remove();
  removeTyping();

  const msgDate = timestamp ? new Date(timestamp) : new Date();
  maybeInsertDateSep(msgDate);

  const msg = document.createElement("div");
  msg.className = `msg ${role}`;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.appendChild(renderText(text));

  const time = document.createElement("div");
  time.className = "time";
  time.textContent = formatTime(msgDate);

  msg.appendChild(bubble);
  msg.appendChild(time);
  messagesEl.appendChild(msg);
  scrollToBottomIfNeeded();
}

// ---------------------------------------------------------------------------
// Typing indicator
// ---------------------------------------------------------------------------
function showTyping() {
  if (typingEl) return;
  if (emptyState) emptyState.remove();

  const msg = document.createElement("div");
  msg.className = "msg pet";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  const dots = document.createElement("div");
  dots.className = "typing-indicator";
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement("div");
    dot.className = "dot";
    dots.appendChild(dot);
  }
  bubble.appendChild(dots);
  msg.appendChild(bubble);
  messagesEl.appendChild(msg);
  forceScrollToBottom();
  typingEl = msg;
}

function removeTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

// ---------------------------------------------------------------------------
// Send message
// ---------------------------------------------------------------------------
let _sending = false;

async function send() {
  const text = inputEl.value.trim();
  if (!text || _sending) return;

  _sending = true;
  inputEl.value = "";
  inputEl.disabled = true;
  sendBtn.disabled = true;
  addMessage(text, "user");
  showTyping();

  try {
    const result = await window.chatAPI.send(text);
    removeTyping();
    if (result && result.ok && result.reply) {
      addMessage(result.reply, "pet");
    } else {
      addMessage(result?.error || "*歪了歪头*", "pet");
    }
  } catch (err) {
    removeTyping();
    addMessage("*困惑地歪了歪头*", "pet");
  }
  _sending = false;
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// Enter to send
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

// Receive proactive messages or observation comments
window.chatAPI.onReply((data) => {
  if (data && data.text) {
    addMessage(data.text, "pet");
  }
});

window.chatAPI.onTyping(() => showTyping());

// ---------------------------------------------------------------------------
// Load conversation history on open
// ---------------------------------------------------------------------------
window.chatAPI.getHistory().then((data) => {
  if (data && data.messages && data.messages.length > 0) {
    // Show summary separator if exists
    if (data.summary) {
      const summaryEl = document.createElement("div");
      summaryEl.style.cssText = "text-align:center; font-size:11px; color:var(--text-dim); padding:8px; margin:4px 0;";
      summaryEl.textContent = "── earlier conversation summarized ──";
      messagesEl.appendChild(summaryEl);
    }
    // Show recent messages (last 30, skip observation/event types)
    const recent = data.messages.slice(-30);
    for (const msg of recent) {
      if (msg.role === "user") addMessage(msg.content, "user", msg.ts);
      else if (msg.role === "assistant") addMessage(msg.content, "pet", msg.ts);
    }
    // After loading history, always scroll to bottom
    forceScrollToBottom();
  } else {
    // No history — show last commentary if available
    window.chatAPI.getContext().then((ctx) => {
      if (ctx && ctx.lastCommentary) addMessage(ctx.lastCommentary, "pet");
    }).catch(() => {});
  }
}).catch(() => {});
</script>
</body>
</html>
